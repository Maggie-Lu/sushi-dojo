<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sushi Dojo — Kitchen Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0ebe2;
    --muted: #666;
    --vermillion: #e74c3c;
    --gold: #f0c040;
    --green: #27ae60;
    --blue: #2980b9;
    --purple: #8e44ad;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.2rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo span { color: var(--vermillion); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .ws-status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .ws-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }

  .ws-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    padding: 1rem 2rem;
    border-right: 1px solid var(--border);
    text-align: center;
  }

  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .stat.pending .stat-num { color: var(--gold); }
  .stat.preparing .stat-num { color: var(--blue); }
  .stat.ready .stat-num { color: var(--green); }
  .stat.done .stat-num { color: var(--muted); }

  /* FILTERS */
  .filters {
    padding: 1rem 2rem;
    display: flex;
    gap: 0.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .filter-btn.active {
    border-color: var(--vermillion);
    color: var(--vermillion);
  }

  /* ORDERS GRID */
  .orders-container {
    padding: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    align-items: start;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
  }

  .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 1rem; }

  /* ORDER CARD */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: cardIn 0.3s ease;
    transition: border-color 0.2s;
  }

  @keyframes cardIn {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .order-card.new-flash {
    animation: cardIn 0.3s ease, flash 0.8s ease;
  }

  @keyframes flash {
    0%, 100% { border-color: var(--border); }
    50% { border-color: var(--vermillion); box-shadow: 0 0 20px rgba(231,76,60,0.4); }
  }

  .order-card-header {
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .order-id {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--gold);
  }

  .status-badge {
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-badge.pending { background: rgba(240,192,64,0.15); color: var(--gold); }
  .status-badge.preparing { background: rgba(41,128,185,0.15); color: var(--blue); }
  .status-badge.ready { background: rgba(39,174,96,0.15); color: var(--green); }
  .status-badge.delivered { background: rgba(100,100,100,0.15); color: var(--muted); }

  .order-card-body { padding: 1.25rem; }

  .customer-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .customer-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .order-type-pill {
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    font-weight: 500;
  }

  .order-type-pill.pickup { background: rgba(142,68,173,0.2); color: #b07bdc; }
  .order-type-pill.delivery { background: rgba(231,76,60,0.2); color: #e07070; }

  .order-meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    font-family: 'DM Mono', monospace;
  }

  .order-items {
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .order-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.3rem 0;
    font-size: 0.875rem;
  }

  .order-item-left {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .item-qty-badge {
    background: var(--border);
    padding: 0.1rem 0.35rem;
    border-radius: 2px;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
  }

  .order-notes {
    background: rgba(240,192,64,0.05);
    border: 1px solid rgba(240,192,64,0.15);
    border-radius: 2px;
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
    color: var(--gold);
    margin-bottom: 0.75rem;
    display: flex;
    gap: 0.5rem;
  }

  .order-total {
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    font-size: 0.95rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    margin-bottom: 1rem;
  }

  .timer {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .timer.urgent { color: var(--vermillion); }

  /* ACTION BUTTONS */
  .action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .action-btn {
    padding: 0.6rem;
    border: 1px solid;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    background: transparent;
  }

  .action-btn.start {
    border-color: var(--blue);
    color: var(--blue);
  }
  .action-btn.start:hover { background: rgba(41,128,185,0.15); }

  .action-btn.ready {
    border-color: var(--green);
    color: var(--green);
  }
  .action-btn.ready:hover { background: rgba(39,174,96,0.15); }

  .action-btn.done {
    border-color: var(--muted);
    color: var(--muted);
    grid-column: 1 / -1;
  }
  .action-btn.done:hover { background: rgba(100,100,100,0.1); }

  .action-btn.full { grid-column: 1 / -1; }

  /* NOTIFICATION */
  .notification {
    position: fixed;
    top: 80px;
    right: 2rem;
    background: var(--vermillion);
    color: white;
    padding: 1rem 1.5rem;
    border-radius: 4px;
    font-weight: 500;
    font-size: 0.9rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 999;
    animation: slideIn 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>道場</span> Kitchen Dashboard</div>
  <div class="header-right">
    <div class="ws-status">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">Disconnected</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat pending">
    <div class="stat-num" id="statPending">0</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat preparing">
    <div class="stat-num" id="statPreparing">0</div>
    <div class="stat-label">Preparing</div>
  </div>
  <div class="stat ready">
    <div class="stat-num" id="statReady">0</div>
    <div class="stat-label">Ready</div>
  </div>
  <div class="stat done">
    <div class="stat-num" id="statDone">0</div>
    <div class="stat-label">Completed Today</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('active', this)">🔥 Active</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">⏳ Pending</button>
  <button class="filter-btn" onclick="setFilter('preparing', this)">👨‍🍳 Preparing</button>
  <button class="filter-btn" onclick="setFilter('ready', this)">✅ Ready</button>
  <button class="filter-btn" onclick="setFilter('delivered', this)">📦 Delivered</button>
  <button class="filter-btn" onclick="setFilter('all', this)">All Orders</button>
</div>

<div class="orders-container" id="ordersContainer">
  <div class="empty-state">
    <div class="empty-state-icon">🍱</div>
    <p>Connecting to server...</p>
  </div>
</div>

<script src="config.js"></script>
<script>
const API = CONFIG.API;
const WS_URL = CONFIG.WS;

let orders = [];
let currentFilter = 'active';
let ws;
let timers = {};

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// WebSocket
let wsConnected = false;
let pollInterval = null;

function connectWS() {
  try {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      wsConnected = true;
      document.getElementById('wsDot').classList.add('connected');
      document.getElementById('wsLabel').textContent = 'Live';
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'new_order') {
        orders.unshift(msg.order);
        showNotification('New ' + msg.order.order_type + ' order from ' + msg.order.customer_name + '!');
        renderOrders();
        updateStats();
      } else if (msg.type === 'order_updated') {
        const idx = orders.findIndex(o => o.id === msg.order_id);
        if (idx !== -1) {
          orders[idx].status = msg.status;
          renderOrders();
          updateStats();
        }
      }
    };

    ws.onclose = () => {
      wsConnected = false;
      document.getElementById('wsDot').classList.remove('connected');
      document.getElementById('wsLabel').textContent = 'Reconnecting...';
      startPolling();
      setTimeout(connectWS, 5000);
    };

    ws.onerror = () => ws.close();

  } catch(e) {
    startPolling();
  }
}

// Polling fallback - checks for new/updated orders every 4 seconds
function startPolling() {
  if (pollInterval) return;
  document.getElementById('wsLabel').textContent = 'Polling';
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch(API + '/orders');
      const fresh = await res.json();
      let changed = false;
      fresh.forEach(freshOrder => {
        const existing = orders.find(o => o.id === freshOrder.id);
        if (!existing) {
          orders.unshift(freshOrder);
          showNotification('New ' + freshOrder.order_type + ' order from ' + freshOrder.customer_name + '!');
          changed = true;
        } else if (existing.status !== freshOrder.status) {
          existing.status = freshOrder.status;
          changed = true;
        }
      });
      if (changed) { renderOrders(); updateStats(); }
    } catch(e) {}
  }, 4000);
}

async function loadOrders() {
  try {
    const res = await fetch(`${API}/orders`);
    orders = await res.json();
    renderOrders();
    updateStats();
  } catch (e) {
    document.getElementById('ordersContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <p>Could not connect to server.<br/><small style="color:var(--muted)">Make sure the backend is running.</small></p>
      </div>`;
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function getFilteredOrders() {
  if (currentFilter === 'active') return orders.filter(o => ['pending', 'preparing', 'ready'].includes(o.status));
  if (currentFilter === 'all') return orders;
  return orders.filter(o => o.status === currentFilter);
}

function getElapsed(createdAt) {
  const created = new Date(createdAt + 'Z');
  const diff = Math.floor((Date.now() - created.getTime()) / 1000);
  if (diff < 60) return `${diff}s ago`;
  const mins = Math.floor(diff / 60);
  if (mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins / 60)}h ${mins % 60}m ago`;
}

function isUrgent(createdAt) {
  const created = new Date(createdAt + 'Z');
  return (Date.now() - created.getTime()) > 20 * 60 * 1000; // 20 mins
}

function renderOrders() {
  const filtered = getFilteredOrders();
  const container = document.getElementById('ordersContainer');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🍱</div>
        <p>No orders here right now.</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(order => {
    const urgent = order.created_at && isUrgent(order.created_at);
    const elapsed = order.created_at ? getElapsed(order.created_at) : '';
    const total = order.items.reduce((s, i) => s + i.price * i.quantity, 0);

    return `
    <div class="order-card" id="card-${order.id}">
      <div class="order-card-header">
        <div class="order-id">#${String(order.id).padStart(4, '0')}</div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          ${elapsed ? `<span class="timer ${urgent ? 'urgent' : ''}">${elapsed}</span>` : ''}
          <span class="status-badge ${order.status}">${order.status}</span>
        </div>
      </div>
      <div class="order-card-body">
        <div class="customer-info">
          <div class="customer-name">${order.customer_name}</div>
          <div class="order-type-pill ${order.order_type}">${order.order_type === 'pickup' ? '🏃 Pickup' : '🛵 Delivery'}</div>
        </div>
        <div class="order-meta">
          <span>📞 ${order.phone}</span>
          ${order.address ? `<span>📍 ${order.address}</span>` : ''}
        </div>
        ${order.notes ? `<div class="order-notes">⚠️ ${order.notes}</div>` : ''}
        <div class="order-items">
          ${order.items.map(item => `
            <div class="order-item-row">
              <div class="order-item-left">
                <span>${item.emoji}</span>
                <span>${item.name}</span>
              </div>
              <span class="item-qty-badge">×${item.quantity}</span>
            </div>
          `).join('')}
        </div>
        <div class="order-total">
          <span>Total</span>
          <span>$${order.total.toFixed(2)}</span>
        </div>
        <div class="action-buttons">
          ${getActionButtons(order)}
        </div>
      </div>
    </div>`;
  }).join('');

  // Start live timer updates
  clearInterval(window.timerInterval);
  window.timerInterval = setInterval(() => {
    filtered.forEach(order => {
      if (!order.created_at) return;
      const card = document.getElementById(`card-${order.id}`);
      if (!card) return;
      const timerEl = card.querySelector('.timer');
      if (timerEl) {
        timerEl.textContent = getElapsed(order.created_at);
        timerEl.className = `timer ${isUrgent(order.created_at) ? 'urgent' : ''}`;
      }
    });
  }, 10000);
}

function getActionButtons(order) {
  switch (order.status) {
    case 'pending':
      return `<button class="action-btn start full" onclick="updateStatus(${order.id}, 'preparing')">👨‍🍳 Start Preparing</button>`;
    case 'preparing':
      return `<button class="action-btn ready full" onclick="updateStatus(${order.id}, 'ready')">✅ Mark as Ready</button>`;
    case 'ready':
      return `<button class="action-btn done" onclick="updateStatus(${order.id}, 'delivered')">📦 Mark as ${order.order_type === 'delivery' ? 'Delivered' : 'Picked Up'}</button>`;
    case 'delivered':
      return `<button class="action-btn done" style="opacity:0.4;cursor:default">✓ Completed</button>`;
    default:
      return '';
  }
}

async function updateStatus(orderId, status) {
  try {
    await fetch(`${API}/orders/${orderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    // WS will update UI
  } catch (e) {
    alert('Error updating order status.');
  }
}

function updateStats() {
  document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;
  document.getElementById('statPreparing').textContent = orders.filter(o => o.status === 'preparing').length;
  document.getElementById('statReady').textContent = orders.filter(o => o.status === 'ready').length;
  document.getElementById('statDone').textContent = orders.filter(o => o.status === 'delivered').length;
}

function showNotification(msg) {
  const el = document.createElement('div');
  el.className = 'notification';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);

  // Play audio beep
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

loadOrders();
connectWS();
</script>
</body>
</html>
